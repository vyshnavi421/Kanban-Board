<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
<div class="container">
<header>
<h1><i class="fa-solid fa-table-columns"></i> Kanban Board</h1>
<p>Organize your tasks efficiently.</p>
</header>
<section class="task-form">
<input
type="text"
id="taskTitle"
placeholder="Task Title">
<textarea
id="taskDesc"
placeholder="Task Description"></textarea>
<select id="priority">
<option value="High"> High</option>
<option value="Medium"> Medium</option>
<option value="Low">Low</option>
</select>
<button onclick="addTask()">
<i class="fa-solid fa-plus"></i>
Add Task</button>
</section>
<section class="board">
<div
class="column"
id="todo"
ondrop="drop(event)"
ondragover="allowDrop(event)">

<h2> To Do</h2>

<div class="task-list"
id="todoList">
</div>
</div>
<div
class="column"
id="progress"
ondrop="drop(event)"
ondragover="allowDrop(event)">
<h2>In Progress</h2>
<div
class="task-list"
id="progressList">
</div>
</div>
<div
class="column"
id="done"
ondrop="drop(event)"
ondragover="allowDrop(event)">
<h2> Done</h2>
<div
class="task-list"
id="doneList">
</div>
</div>
</section>
</div>
<script src="script.js"></script>
</body>
</html>
